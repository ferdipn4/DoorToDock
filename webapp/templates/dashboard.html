{% extends "base.html" %}
{% block title %}Live Status{% endblock %}

{% block content %}
<!-- Stats Row -->
<div class="row g-3 mb-4" id="stats-row">
    <div class="col-6 col-md-3">
        <div class="card h-100">
            <div class="card-body text-center">
                <div class="text-body-secondary small">Stations</div>
                <div class="fs-2 fw-bold" id="stat-stations">--</div>
            </div>
        </div>
    </div>
    <div class="col-6 col-md-3">
        <div class="card h-100">
            <div class="card-body text-center">
                <div class="text-body-secondary small">Data Points</div>
                <div class="fs-2 fw-bold" id="stat-datapoints">--</div>
            </div>
        </div>
    </div>
    <div class="col-6 col-md-3">
        <div class="card h-100">
            <div class="card-body text-center">
                <div class="text-body-secondary small">Collection</div>
                <div class="fs-2 fw-bold"><span id="stat-days">--</span> <span class="fs-6 fw-normal">days</span></div>
            </div>
        </div>
    </div>
    <div class="col-6 col-md-3">
        <div class="card h-100 weather-card">
            <div class="card-body text-center">
                <div class="text-body-secondary small">Weather Now</div>
                <div class="fs-2 fw-bold"><span id="stat-temp">--</span><span class="fs-6 fw-normal">°C</span></div>
                <div class="small text-body-secondary" id="stat-weather-desc">--</div>
            </div>
        </div>
    </div>
</div>

<!-- Map + Stations -->
<div class="row g-3">
    <!-- Map -->
    <div class="col-lg-7">
        <div class="card h-100">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span><i class="bi bi-geo-alt"></i> Station Map – Imperial College Area</span>
                <span class="badge bg-secondary" id="map-radius">800m radius</span>
            </div>
            <div class="card-body p-0">
                <div id="map" style="height: 480px; border-radius: 0 0 0.375rem 0.375rem;"></div>
            </div>
        </div>
    </div>

    <!-- Station Cards -->
    <div class="col-lg-5">
        <div class="card h-100">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span><i class="bi bi-bicycle"></i> Stations</span>
                <div class="d-flex gap-2">
                    <span class="badge status-green" id="count-green">0</span>
                    <span class="badge status-yellow" id="count-yellow">0</span>
                    <span class="badge status-red" id="count-red">0</span>
                </div>
            </div>
            <div class="card-body station-list p-2" id="station-list">
                <div class="text-center text-body-secondary py-5">
                    <div class="spinner-border spinner-border-sm" role="status"></div>
                    Loading stations...
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
{% endblock %}
