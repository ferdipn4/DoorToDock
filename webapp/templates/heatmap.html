{% extends "base.html" %}
{% block title %}Heatmap{% endblock %}

{% block content %}
<div class="row g-3 mb-3">
    <div class="col-md-6">
        <label class="form-label text-body-secondary small">Station</label>
        <select class="form-select" id="station-select">
            <option value="">All Stations (Average)</option>
        </select>
    </div>
    <div class="col-md-6">
        <label class="form-label text-body-secondary small">Metric</label>
        <div class="btn-group w-100" role="group">
            <button class="btn btn-outline-secondary active" data-metric="avg_bikes">Available Bikes</button>
            <button class="btn btn-outline-secondary" data-metric="avg_docks">Empty Docks</button>
        </div>
    </div>
</div>

<!-- Heatmap: Available Bikes -->
<div class="card mb-3">
    <div class="card-header d-flex justify-content-between align-items-center">
        <span><i class="bi bi-grid-3x3"></i> <span id="heatmap-title">Average Available Bikes</span> by Hour &amp; Day</span>
        <div class="d-flex align-items-center gap-2 small">
            <span class="text-body-secondary">Low</span>
            <div class="heatmap-legend"></div>
            <span class="text-body-secondary">High</span>
        </div>
    </div>
    <div class="card-body">
        <div class="heatmap-container" id="heatmap-grid">
            <div class="text-center text-body-secondary py-5">
                <div class="spinner-border spinner-border-sm" role="status"></div>
                Loading heatmap...
            </div>
        </div>
    </div>
</div>

<!-- Insights -->
<div class="row g-3">
    <div class="col-md-4">
        <div class="card h-100">
            <div class="card-body text-center">
                <div class="text-body-secondary small">Peak Hours (Most Bikes)</div>
                <div class="fs-4 fw-bold text-success" id="insight-peak">--</div>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card h-100">
            <div class="card-body text-center">
                <div class="text-body-secondary small">Low Hours (Fewest Bikes)</div>
                <div class="fs-4 fw-bold text-danger" id="insight-low">--</div>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card h-100">
            <div class="card-body text-center">
                <div class="text-body-secondary small">Busiest Day</div>
                <div class="fs-4 fw-bold text-warning" id="insight-busiest">--</div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/heatmap.js') }}"></script>
{% endblock %}
