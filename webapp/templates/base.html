<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#F5F5F0">
    <title>{% block title %}DockSense{% endblock %}</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚲</text></svg>">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- Apply saved theme immediately to prevent flash -->
    <script>
    (function() {
        var t = localStorage.getItem('ds_appearance');
        if (t === 'dark') document.documentElement.setAttribute('data-bs-theme', 'dark');
        else if (t === 'light') document.documentElement.setAttribute('data-bs-theme', 'light');
    })();
    </script>
    {% block head %}{% endblock %}
</head>
<body>
    <div class="app-shell">
        <!-- Desktop Sidebar -->
        <nav class="sidebar" aria-label="Main navigation">
            <div class="sidebar-nav">
                <a href="/go?timing=now" class="sidebar-item {% if active_tab == 'go' and active_timing|default('now') == 'now' %}active{% endif %}" data-tooltip="Leave now">
                    <i class="bi bi-cursor-fill"></i>
                    <span class="sidebar-item-label">Now</span>
                </a>
                <a href="/go?timing=plan" class="sidebar-item {% if active_tab == 'go' and active_timing|default('now') == 'plan' %}active{% endif %}" data-tooltip="Plan trip">
                    <i class="bi bi-calendar-check"></i>
                    <span class="sidebar-item-label">Plan</span>
                </a>
                <a href="/insights" class="sidebar-item {% if active_tab == 'insights' %}active{% endif %}" data-tooltip="Insights">
                    <i class="bi bi-bar-chart"></i>
                    <span class="sidebar-item-label">Insights</span>
                </a>
                <div class="sidebar-spacer"></div>
                <a href="/settings" class="sidebar-item {% if active_tab == 'settings' %}active{% endif %}" data-tooltip="Settings">
                    <i class="bi bi-gear"></i>
                    <span class="sidebar-item-label">Settings</span>
                </a>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="app-content">
            {% block content %}{% endblock %}
        </main>
    </div>

    <!-- Mobile Bottom Nav -->
    <nav class="bottom-nav" aria-label="Main navigation">
        <a href="/go?timing=now" class="bottom-nav-item {% if active_tab == 'go' and active_timing|default('now') == 'now' %}active{% endif %}">
            <i class="bi bi-cursor-fill"></i>
            <span>Now</span>
        </a>
        <a href="/go?timing=plan" class="bottom-nav-item {% if active_tab == 'go' and active_timing|default('now') == 'plan' %}active{% endif %}">
            <i class="bi bi-calendar-check"></i>
            <span>Plan trip</span>
        </a>
        <a href="/insights" class="bottom-nav-item {% if active_tab == 'insights' %}active{% endif %}">
            <i class="bi bi-bar-chart"></i>
            <span>Insights</span>
        </a>
        <a href="/settings" class="bottom-nav-item {% if active_tab == 'settings' %}active{% endif %}">
            <i class="bi bi-gear"></i>
            <span>Settings</span>
        </a>
    </nav>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
