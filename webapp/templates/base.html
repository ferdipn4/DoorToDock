<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Door2Dock{% endblock %} – Smart Commute</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚲</text></svg>">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block head %}{% endblock %}
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center gap-2" href="/">
                <i class="bi bi-bicycle fs-4"></i>
                <span class="fw-bold">Door2Dock</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">
                            <i class="bi bi-speedometer2"></i> Live Status
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/timeseries' %}active{% endif %}" href="/timeseries">
                            <i class="bi bi-graph-up"></i> Time Series
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/heatmap' %}active{% endif %}" href="/heatmap">
                            <i class="bi bi-grid-3x3"></i> Heatmap
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/weather' %}active{% endif %}" href="/weather">
                            <i class="bi bi-cloud-rain"></i> Weather
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/planner' %}active{% endif %}" href="/planner">
                            <i class="bi bi-alarm"></i> Planner
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/about' %}active{% endif %}" href="/about">
                            <i class="bi bi-info-circle"></i> About
                        </a>
                    </li>
                </ul>
                <div class="navbar-nav ms-auto">
                    <span class="nav-link text-body-secondary" id="last-update">
                        <i class="bi bi-clock"></i> <span id="update-time">--</span>
                    </span>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container-fluid py-4">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="border-top py-3 mt-4">
        <div class="container-fluid text-center text-body-secondary small">
            Door2Dock &middot; Smart-Commute Predictor &middot; Imperial College London
        </div>
    </footer>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Global: update navbar timestamp on all pages -->
    <script>
    async function _updateNavTime() {
        try {
            const resp = await fetch('/api/weather-now');
            const w = await resp.json();
            if (w.timestamp) {
                const t = new Date(w.timestamp);
                const now = new Date();
                const diffMin = Math.round((now - t) / 60000);
                const timeStr = t.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
                const agoStr = diffMin <= 1 ? 'just now' : diffMin + ' min ago';
                document.getElementById('update-time').textContent = timeStr + ' (' + agoStr + ')';
            }
        } catch (e) { /* silent */ }
    }
    // Only run the global updater if the page script hasn't already set it
    document.addEventListener('DOMContentLoaded', () => {
        // Initial fetch after a short delay (let page scripts run first)
        setTimeout(() => {
            if (document.getElementById('update-time').textContent === '--') {
                _updateNavTime();
            }
        }, 1500);
        // Refresh every 60s on all pages
        setInterval(_updateNavTime, 60000);
    });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
